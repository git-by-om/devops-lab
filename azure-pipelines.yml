trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  jobs:
  - job: BuildJob
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.11'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: 'package'

- stage: Deploy
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    steps:
    - script: echo "Artifact received!"
      displayName: 'Step 1 - Receive Artifact'
    - script: echo "Deploying to App Service..."
      displayName: 'Step 2 - Deploy'
    - script: echo "Reading Key Vault secrets..."
      displayName: 'Step 3 - Key Vault'
    - script: echo "Deployment successful!"
      displayName: 'Step 4 - Verify'